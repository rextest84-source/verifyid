# Edge proxy forwards /api/* and /uploads/* to Railway at runtime.
# Override with RAILWAY_API_URL in Netlify env if the backend URL changes.

[context.production.environment]
  RAILWAY_API_URL = "https://verifyid-production.up.railway.app"

[build]
  command = "node scripts/check-netlify-env.mjs && npm run build"
  publish = "dist/public"

[[edge_functions]]
  function = "api-proxy"
  path = "/api/*"

[[edge_functions]]
  function = "api-proxy"
  path = "/uploads/*"

# Proxy uploads to Railway before the SPA catch-all (edge fn + explicit redirect).
[[redirects]]
  from = "/uploads/*"
  to = "https://verifyid-production.up.railway.app/uploads/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
