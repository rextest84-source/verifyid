<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VerifyID - Identity Verification Platform</title>
    <script>
      // IMMEDIATE BLOCKER — runs before anything else
      (function() {
        'use strict';
        var blockedTexts = ['kimi','agent','watermark','powered by'];
        var blockedClasses = ['watermark','agent','kimi-','inspect-'];
        var blockedIds = ['watermark','agent','kimi-'];

        function shouldBlock(el) {
          if (!el || el.nodeType !== 1) return false;
          var tag = el.tagName.toLowerCase();
          var txt = (el.textContent || '').toLowerCase();
          var cls = (el.className || '').toLowerCase();
          var id = (el.id || '').toLowerCase();
          var style = el.getAttribute('style') || '';

          // Block by text content (short text containing keywords)
          if (txt.length < 60) {
            for (var i = 0; i < blockedTexts.length; i++) {
              if (txt.indexOf(blockedTexts[i]) !== -1) {
                for (var j = 0; j < blockedTexts.length; j++) {
                  if (i !== j && txt.indexOf(blockedTexts[j]) !== -1) return true;
                }
              }
            }
          }

          // Block by class/id
          for (var k = 0; k < blockedClasses.length; k++) {
            if (cls.indexOf(blockedClasses[k]) !== -1) return true;
          }
          for (var l = 0; l < blockedIds.length; l++) {
            if (id.indexOf(blockedIds[l]) !== -1) return true;
          }

          // Block fixed-position overlays that aren't the app
          if ((style.indexOf('position:fixed') !== -1 || style.indexOf('position: fixed') !== -1) &&
              el.id !== 'root' && tag !== 'video' && tag !== 'canvas') {
            if (style.indexOf('top:') !== -1 || style.indexOf('bottom:') !== -1 || style.indexOf('left:') !== -1 || style.indexOf('right:') !== -1) {
              return true;
            }
          }

          // Block high z-index overlays
          var zMatch = style.match(/z-index:\s*(\d+)/);
          if (zMatch && parseInt(zMatch[1]) > 9000) return true;

          return false;
        }

        function remove(el) {
          if (!el || !el.parentNode) return;
          try { el.parentNode.removeChild(el); } catch(e) {}
        }

        function clean() {
          var all = document.querySelectorAll('*');
          for (var i = 0; i < all.length; i++) {
            if (shouldBlock(all[i])) remove(all[i]);
          }
        }

        // Intercept createElement to prevent watermark nodes from being created
        var origCreate = document.createElement;
        document.createElement = function(tag) {
          var el = origCreate.call(document, tag);
          var origSetAttr = el.setAttribute;
          el.setAttribute = function(name, value) {
            if (name === 'style' || name === 'class' || name === 'id') {
              var check = el.cloneNode();
              check.setAttribute(name, value);
              if (shouldBlock(check)) {
                // Silently ignore — watermark element will be useless
                return;
              }
            }
            return origSetAttr.call(this, name, value);
          };
          return el;
        };

        // Intercept appendChild / insertBefore on body and html
        function intercept(node) {
          var origAppend = node.appendChild;
          var origInsert = node.insertBefore;
          node.appendChild = function(child) {
            if (shouldBlock(child)) { remove(child); return child; }
            return origAppend.call(this, child);
          };
          node.insertBefore = function(child, ref) {
            if (shouldBlock(child)) { remove(child); return child; }
            return origInsert.call(this, child, ref);
          };
        }

        if (document.body) intercept(document.body);
        if (document.documentElement) intercept(document.documentElement);

        // MutationObserver for anything that slips through
        var obs = new MutationObserver(function(muts) {
          for (var m = 0; m < muts.length; m++) {
            var added = muts[m].addedNodes;
            for (var n = 0; n < added.length; n++) {
              var node = added[n];
              if (node.nodeType === 1) {
                if (shouldBlock(node)) remove(node);
                else {
                  var kids = node.querySelectorAll ? node.querySelectorAll('*') : [];
                  for (var c = 0; c < kids.length; c++) {
                    if (shouldBlock(kids[c])) remove(kids[c]);
                  }
                }
              }
            }
          }
        });
        obs.observe(document.documentElement, { childList: true, subtree: true });

        // Aggressive periodic cleanup
        setInterval(clean, 100);
        clean();
      })();
    </script>
    <style>
      /* CSS layer — catches anything the JS might miss */
      html body [class*="watermark"],
      html body [class*="agent"],
      html body [id*="watermark"],
      html body [id*="agent"],
      html body [class*="kimi-"],
      html body [id*="kimi-"],
      html body div[style*="position: fixed"]:not(#root),
      html body div[style*="position:fixed"]:not(#root),
      html body span[style*="position: fixed"],
      html body span[style*="position:fixed"],
      html body a[href*="kimi"][style*="position"],
      html body a[href*="agent"][style*="position"],
      html body [style*="z-index: 999"],
      html body [style*="z-index:999"] {
        display: none !important;
        visibility: hidden !important;
        opacity: 0 !important;
        pointer-events: none !important;
        width: 0 !important;
        height: 0 !important;
        overflow: hidden !important;
        position: absolute !important;
        top: -9999px !important;
        left: -9999px !important;
        transform: scale(0) !important;
        filter: blur(100px) !important;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
